set -g prefix C-A

# ----- misc -----
set -g base-index 1
set -g renumber-windows on
set -s escape-time 0 # escape delay with vim
set -g mouse on

# ----- copy mode -----
set -g mode-keys vi

bind Space copy-mode
# if in selection cancel it, else exit copy mode
bind -T copy-mode-vi Escape if -F "#{selection_present}" { send -X clear-selection } { send -X cancel }

bind -T copy-mode-vi h      send -X cursor-left
bind -T copy-mode-vi j      send -X cursor-down
bind -T copy-mode-vi k      send -X cursor-up
bind -T copy-mode-vi l      send -X cursor-right

bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi y      send -X copy-selection-and-cancel


# ----- pane nav -----
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ----- status line -----
set -g status-justify absolute-centre
set -g status-position top
set -g status-left ""
set -g status-right ""

set -g status-style bg=black,fg=white
set -g message-style bg=black,fg=white
# mode-style, message-command-style

# ----- pane split -----
bind + split-window -h
bind _ split-window -v
bind r source-file ~/.tmux.conf

# Enable true color
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:Tc'

